<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — ForgeFlow</title>
  <link rel="icon" type="image/png" href="assets/forge_flow_icon-removebg-preview.png">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/landing.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <a href="index.html" class="auth-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to home
      </a>
      
      <div class="auth-brand">
        <span class="auth-brand-name"><img src="assets/forge_flow_logo-removebg-preview.png" alt="Forge Flow" class="ff-logo ff-logo--auth"></span>
      </div>
      
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your dashboard</p>

      <button class="btn-social google" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      
      <button class="btn-social microsoft" onclick="handleMicrosoftLogin()">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M1 1h10v10H1z" fill="#F25022"/>
          <path d="M13 1h10v10H13z" fill="#7FBA00"/>
          <path d="M1 13h10v10H1z" fill="#00A4EF"/>
          <path d="M13 13h10v10H13z" fill="#FFB900"/>
        </svg>
        Continue with Microsoft
      </button>

      <div class="auth-social-divider">
        <span>or continue with email</span>
      </div>
      
      <form class="auth-form-full" id="loginForm">
        <div class="form-group">
          <label class="form-label">Work Email</label>
          <input type="email" class="form-input" id="email" placeholder="john@acme.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
        </div>
        
        <div id="loginError" class="auth-error" style="display:none"></div>
        
        <button type="button" class="btn-auth-primary" id="loginBtn" onclick="handleLogin()">
          Sign in
        </button>
      </form>
      
      <div class="auth-footer-link">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
    </div>
    
    <div class="auth-visual">
      <div class="auth-visual-content">
        <h2>Welcome back to ForgeFlow</h2>
        <p>Continue managing your manufacturing operations with powerful tools built for modern teams.</p>
      </div>
    </div>
  </div>

  <script>
    function isUnresolvedEnvValue(value) {
      if (!value) return true;
      const trimmed = String(value).trim();
      return !trimmed || trimmed.includes('%VITE_') || trimmed === 'undefined' || trimmed === 'null';
    }

    function normalizeSupabaseUrl(value) {
      return String(value || '').trim().replace(/\/+$/, '');
    }

    function getSupabaseRuntimeConfig() {
      const viteUrl = '%VITE_SUPABASE_URL%';
      const viteKey = '%VITE_SUPABASE_ANON_KEY%';
      const fallbackUrl = window.__FORGEFLOW_SUPABASE_URL || localStorage.getItem('forgeflow_supabase_url') || 'https://secaghvmfkujeciiapav.supabase.co';
      const fallbackKey = window.__FORGEFLOW_SUPABASE_ANON_KEY || localStorage.getItem('forgeflow_supabase_anon_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlY2FnaHZtZmt1amVjaWlhcGF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDA1OTYsImV4cCI6MjA4OTMxNjU5Nn0.sXDDLStGTQ4txc_YcN7MIE1JC96R94ILafoID-_2Nzs';

      const url = isUnresolvedEnvValue(viteUrl) ? fallbackUrl : viteUrl;
      const key = isUnresolvedEnvValue(viteKey) ? fallbackKey : viteKey;

      return {
        url: normalizeSupabaseUrl(url),
        key: String(key || '').trim()
      };
    }

    function getAuthUnavailableMessage() {
      if (window.location.protocol === 'file:') {
        return 'Auth is unavailable from file://. Start with `npm run dev` or deploy the built dist folder.';
      }
      if (typeof supabase === 'undefined') {
        return 'Auth library failed to load. Check internet/ad blocker access to cdn.jsdelivr.net.';
      }
      return 'Authentication service is not configured for this deployment.';
    }

    function isUnsupportedProtocol() {
      return window.location.protocol === 'file:';
    }

    function toFriendlyAuthError(err, fallbackMessage) {
      const raw = String(err?.message || fallbackMessage || 'Authentication failed');
      const lower = raw.toLowerCase();
      if (lower.includes('failed to fetch') || lower.includes('networkerror') || lower.includes('network request failed')) {
        return 'Unable to reach authentication server. Check internet and Supabase URL configuration.';
      }
      if (raw === '{}' || raw === '[object Object]' || raw.trim() === '' || raw === 'undefined' || raw === 'null') {
        return 'An unexpected error occurred. Please try again. If this persists, check your Supabase project status at supabase.com/dashboard.';
      }
      if (lower.includes('invalid login credentials') || lower.includes('invalid email or password')) {
        return 'Invalid email or password. Please check your credentials and try again.';
      }
      if (lower.includes('email not confirmed')) {
        return 'Please confirm your email address before signing in.';
      }
      if (lower.includes('signup') && lower.includes('disabled')) {
        return 'Email signups are currently disabled. Please contact your administrator.';
      }
      if (lower.includes('rate limit')) {
        return 'Too many login attempts. Please wait a moment and try again.';
      }
      return raw;
    }

    function showAuthError(message) {
      const errorDiv = document.getElementById('loginError');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    // Initialize Supabase client with build-time env or runtime fallback.
    const supabaseConfig = getSupabaseRuntimeConfig();
    const hasValidSupabaseConfig = /^https?:\/\//i.test(supabaseConfig.url) && supabaseConfig.key.length > 20;
    var supabaseClient = null;
    if (typeof supabase !== 'undefined' && supabase && hasValidSupabaseConfig) {
      try {
        supabaseClient = supabase.createClient(supabaseConfig.url, supabaseConfig.key);
      } catch (e) {
        console.log('Supabase initialization failed');
      }
    } else if (!hasValidSupabaseConfig) {
      console.warn('Supabase config missing/invalid for login page');
    }

    async function isAuthServerReachable() {
      const endpoint = `${supabaseConfig.url}/auth/v1/settings`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      try {
        await fetch(endpoint, {
          method: 'GET',
          headers: { apikey: supabaseConfig.key },
          cache: 'no-store',
          signal: controller.signal
        });
        return true;
      } catch (e) {
        return false;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function ensureAuthServerReachable() {
      if (!supabaseClient) return false;
      const reachable = await isAuthServerReachable();
      if (!reachable) {
        showAuthError(`Unable to reach authentication server at ${supabaseConfig.url}. Check DNS/firewall and Supabase project status.`);
        return false;
      }
      return true;
    }
    
    // Check if user is already logged in
    async function checkExistingSession() {
      if (!supabaseClient || isUnsupportedProtocol()) return;
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          window.location.href = 'app.html';
        }
      } catch (e) {
        console.log('Session check failed');
      }
    }
    checkExistingSession();

    function showLoading(btn, text) {
      btn.disabled = true;
      btn.innerHTML = '<span style="display: inline-flex; align-items: center; gap: 10px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"/></svg>' + text + '</span>';
    }

    function resetButton(btn) {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }

    function showRedirectOverlay() {
      const overlay = document.createElement('div');
      overlay.id = 'redirect-overlay';
      overlay.innerHTML = `
        <div class="redirect-content">
          <div class="redirect-spinner"></div>
          <p>Welcome back!</p>
        </div>
      `;
      overlay.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.95);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: fadeIn 0.3s ease;
      `;
      document.body.appendChild(overlay);
    }

    async function handleGoogleLogin() {
      if (isUnsupportedProtocol()) {
        showAuthError(getAuthUnavailableMessage());
        return;
      }
      if (!supabaseClient) {
        showAuthError(getAuthUnavailableMessage());
        return;
      }
      if (!(await ensureAuthServerReachable())) return;
      
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/app.html'
        }
      });
      
      if (error) {
        showAuthError(toFriendlyAuthError(error, 'Google login failed'));
      }
    }

    async function handleMicrosoftLogin() {
      if (isUnsupportedProtocol()) {
        showAuthError(getAuthUnavailableMessage());
        return;
      }
      if (!supabaseClient) {
        showAuthError(getAuthUnavailableMessage());
        return;
      }
      if (!(await ensureAuthServerReachable())) return;
      
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'azure',
        options: {
          redirectTo: window.location.origin + '/app.html'
        }
      });
      
      if (error) {
        showAuthError(toFriendlyAuthError(error, 'Microsoft login failed'));
      }
    }

    async function ensureUserWorkspace(user, email) {
      const { data: existingUser, error: existingUserError } = await supabaseClient
        .from('users')
        .select('id,company_id,first_name,last_name,email')
        .eq('auth_id', user.id)
        .maybeSingle();

      if (existingUserError) throw existingUserError;
      if (existingUser?.company_id) return existingUser;

      const firstName = user.user_metadata?.first_name || 'User';
      const lastName = user.user_metadata?.last_name || '';
      const companyName = user.user_metadata?.company_name || `${firstName}'s Company`;
      const slugBase = companyName
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 42);
      const slug = `${slugBase || 'forgeflow-company'}-${user.id.slice(0, 8)}`;

      const { data: company, error: companyError } = await supabaseClient
        .from('companies')
        .insert({
          name: companyName,
          slug: slug,
          owner_auth_id: user.id
        })
        .select('id,name')
        .single();

      if (companyError) throw companyError;

      if (!existingUser) {
        const { error: createUserError } = await supabaseClient
          .from('users')
          .insert({
            auth_id: user.id,
            company_id: company.id,
            first_name: firstName,
            last_name: lastName,
            email: email,
            role: 'admin'
          });
        if (createUserError) throw createUserError;
      } else {
        const { error: updateUserError } = await supabaseClient
          .from('users')
          .update({
            company_id: company.id,
            first_name: firstName,
            last_name: lastName,
            email: email,
            role: 'admin',
            updated_at: new Date().toISOString()
          })
          .eq('id', existingUser.id);
        if (updateUserError) throw updateUserError;
      }

      return {
        first_name: firstName,
        last_name: lastName,
        email: email,
        companies: { name: company.name }
      };
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');
      
      errorDiv.style.display = 'none';
      
      if (!email || !password) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.style.display = 'block';
        return;
      }
      
      showLoading(submitBtn, 'Signing in...');

      if (isUnsupportedProtocol()) {
        showAuthError(getAuthUnavailableMessage());
        resetButton(submitBtn);
        return;
      }
      
      if (!supabaseClient) {
        showAuthError(getAuthUnavailableMessage());
        resetButton(submitBtn);
        return;
      }
      if (!(await ensureAuthServerReachable())) {
        resetButton(submitBtn);
        return;
      }
      
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        // Get user profile
        if (data.user) {
          let { data: profile } = await supabaseClient
            .from('users')
            .select('first_name,last_name,email,company_id,companies(name)')
            .eq('auth_id', data.user.id)
            .maybeSingle();

          if (!profile || !profile.company_id) {
            await ensureUserWorkspace(data.user, email);
            const { data: refreshedProfile } = await supabaseClient
              .from('users')
              .select('first_name,last_name,email,company_id,companies(name)')
              .eq('auth_id', data.user.id)
              .maybeSingle();
            profile = refreshedProfile || profile;
          }
          
          const firstName = profile?.first_name || data.user.user_metadata?.first_name || '';
          const lastName = profile?.last_name || data.user.user_metadata?.last_name || '';
          const companyName = profile?.companies?.name || data.user.user_metadata?.company_name || '';
          const initials = (firstName[0] || email[0] || 'U').toUpperCase() + 
                          (lastName[0] || '').toUpperCase();
          
          localStorage.setItem('forgeflow_user', JSON.stringify({
            id: data.user.id,
            email: data.user.email,
            first_name: firstName,
            last_name: lastName,
            company_name: companyName,
            initials: initials
          }));
        }
        
        submitBtn.innerHTML = '<span style="display: inline-flex; align-items: center; gap: 10px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Welcome back!</span>';
        submitBtn.disabled = true;
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 500);
        
      } catch (err) {
        console.error('Login error:', err);
        showAuthError(toFriendlyAuthError(err, 'Invalid email or password'));
        resetButton(submitBtn);
      }
    }
  </script>
  
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px;
    }
    
    .auth-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      max-width: 1000px;
      width: 100%;
      align-items: center;
    }
    
    .auth-card {
      background: white;
      border-radius: 24px;
      padding: 48px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    
    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-500);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .auth-back:hover { color: var(--gray-700); }
    
    .auth-brand {
      text-align: center;
      margin-bottom: 0;
    }
    .auth-brand-name {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-color);
      letter-spacing: -0.5px;
    }
    
    .auth-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: #111;
      text-align: center;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    
    .auth-subtitle {
      font-size: 14px;
      color: var(--gray-500);
      text-align: center;
      margin-bottom: 32px;
    }
    
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--gray-100);
      background: white;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    .btn-social:hover {
      border-color: var(--gray-300);
      background: var(--gray-50);
    }
    .btn-social svg {
      width: 20px;
      height: 20px;
    }
    
    .auth-social-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 20px 0;
    }
    .auth-social-divider::before,
    .auth-social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-100);
    }
    .auth-social-divider span {
      font-size: 12px;
      color: var(--gray-400);
      font-weight: 500;
    }
    
    .auth-form-full {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
    }
    
    .form-input {
      padding: 12px 16px;
      border: 1.5px solid var(--gray-100);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s;
      background: white;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(255,106,0,0.1);
    }
    .form-input::placeholder {
      color: var(--gray-300);
    }
    
    .auth-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #DC2626;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
    }
    
    .btn-auth-primary {
      width: 100%;
      padding: 14px 24px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-auth-primary:hover:not(:disabled) {
      background: #e55d00;
      transform: translateY(-1px);
    }
    .btn-auth-primary:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }
    
    .auth-footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--gray-500);
    }
    .auth-footer-link a {
      color: var(--accent-color);
      font-weight: 700;
      text-decoration: none;
      padding: 4px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .auth-footer-link a:hover {
      background: rgba(255, 106, 0, 0.1);
      text-decoration: underline;
    }
    
    .auth-visual {
      color: white;
    }
    
    .auth-visual-content h2 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #111;
    }
    
    .auth-visual-content p {
      font-size: 16px;
      color: var(--gray-500);
      line-height: 1.6;
    }
    
    @media (max-width: 768px) {
      .auth-container {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      .auth-visual { display: none; }
      .auth-card { padding: 32px 24px; }
    }
  </style>
</body>
</html>
